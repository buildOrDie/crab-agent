<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>$CRAB Agent — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080E0C;
  --term:#050C0A;
  --red:#E82020;
  --red2:#FF4444;
  --teal:#00C9A7;
  --teal2:#5EFFD8;
  --amber:#FFB347;
  --gray:#3D5248;
  --white:#D8E6E0;
  --dim:rgba(216,230,224,.3);
  --font:'JetBrains Mono',monospace;
  --orb:'Orbitron',monospace;
}

html, body {
  width: 1280px;
  height: 720px;
  overflow: hidden;
  background: var(--bg);
  color: var(--white);
  font-family: var(--font);
}

/* OUTER LAYOUT */
.outer {
  width: 1280px;
  height: 720px;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
}

/* BG GRID */
.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,201,167,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,201,167,.03) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}

/* BG GLOW */
.bg-glow {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 50%, rgba(232,32,32,.06) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 50%, rgba(0,201,167,.07) 0%, transparent 45%);
  pointer-events: none;
}

/* TOP BAR */
.topbar {
  height: 52px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  border-bottom: 1px solid rgba(0,201,167,.12);
  background: rgba(5,12,10,.8);
  position: relative;
  z-index: 5;
}
.topbar-logo {
  font-family: var(--orb);
  font-size: 14px;
  color: var(--red2);
  letter-spacing: 5px;
}
.topbar-center {
  font-size: 11px;
  color: rgba(0,201,167,.5);
  letter-spacing: 3px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--teal);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,201,167,.4)}
  50%{opacity:.7;box-shadow:0 0 0 5px rgba(0,201,167,.0)}
}
.status-text {
  font-size: 10px;
  color: var(--teal);
  letter-spacing: 2px;
}

/* MAIN CONTENT */
.main {
  flex: 1;
  display: flex;
  gap: 0;
  position: relative;
  z-index: 2;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 200px;
  flex-shrink: 0;
  border-right: 1px solid rgba(0,201,167,.08);
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sidebar-label {
  font-size: 9px;
  color: rgba(255,255,255,.2);
  letter-spacing: 3px;
  padding: 0 20px;
  margin-bottom: 10px;
}
.step-item {
  padding: 9px 20px;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--gray);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all .25s;
  position: relative;
}
.step-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--teal);
  transform: scaleY(0);
  transition: transform .25s;
}
.step-item.active {
  color: var(--teal2);
  background: rgba(0,201,167,.05);
}
.step-item.active::before { transform: scaleY(1); }
.step-item.done { color: rgba(0,201,167,.4); }
.step-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  border: 1px solid currentColor;
  flex-shrink: 0;
  transition: background .25s;
}
.step-item.active .step-dot { background: var(--teal); border-color: var(--teal); }
.step-item.done .step-dot { background: rgba(0,201,167,.4); border-color: rgba(0,201,167,.4); }

.sidebar-bottom {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,.04);
}
.sidebar-stat {
  font-size: 9px;
  color: rgba(255,255,255,.2);
  letter-spacing: 1px;
  line-height: 2;
}
.sidebar-stat span { color: var(--teal); }

/* TERMINAL */
.terminal-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.term-bar {
  height: 36px;
  flex-shrink: 0;
  background: rgba(8,18,15,.9);
  border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 6px;
}
.dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink:0; }
.dot-r { background: #FF5F57; }
.dot-y { background: #FFBD2E; }
.dot-g { background: #28C840; }
.term-path {
  flex: 1;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,.25);
  letter-spacing: 1px;
}
.term-body {
  flex: 1;
  background: var(--term);
  padding: 18px 24px;
  overflow: hidden;
  position: relative;
}

/* SCANLINE */
.scanline {
  position: absolute;
  left: 0; right: 0;
  height: 120px;
  background: linear-gradient(transparent, rgba(0,201,167,.015), transparent);
  animation: scan 6s linear infinite;
  pointer-events: none;
  z-index: 1;
}
@keyframes scan { 0%{top:-120px} 100%{top:100%} }

/* LINES */
#lines { position: relative; z-index: 2; }
.line {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  min-height: 20px;
  margin: 1px 0;
  font-size: 12px;
  line-height: 1.55;
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity .12s ease, transform .12s ease;
}
.line.show { opacity: 1; transform: translateX(0); }

.ts { color: #2A4A3E; font-size: 11px; flex-shrink: 0; min-width: 76px; }
.info { color: var(--teal); }
.quantum { color: var(--teal2); }
.warn { color: var(--amber); }
.ok { color: #68D391; }
.red { color: var(--red2); }
.muted { color: rgba(216,230,224,.28); }
.bold { font-weight: 700; }
.sep { border-top: 1px solid rgba(255,255,255,.04); margin: 3px 0; width: 100%; }
.blank { height: 5px; }

.tweet-box {
  background: rgba(0,201,167,.05);
  border: 1px solid rgba(0,201,167,.18);
  border-radius: 5px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--white);
  line-height: 1.7;
  margin: 3px 0;
}

/* CURSOR */
.cursor {
  display: inline-block;
  width: 7px; height: 13px;
  background: var(--teal);
  animation: blink .75s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* BOTTOM BAR */
.bottombar {
  height: 44px;
  flex-shrink: 0;
  border-top: 1px solid rgba(0,201,167,.08);
  background: rgba(5,12,10,.8);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: relative;
  z-index: 5;
}
.progress-track {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,.06);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), var(--teal));
  width: 0%;
  transition: width .35s ease;
  border-radius: 2px;
}
.progress-label {
  font-size: 10px;
  color: rgba(0,201,167,.5);
  letter-spacing: 2px;
  min-width: 260px;
  text-align: right;
}
.ctrl-btn {
  background: transparent;
  border: 1px solid rgba(0,201,167,.22);
  color: var(--teal);
  font-family: var(--font);
  font-size: 10px;
  letter-spacing: 2px;
  padding: 5px 14px;
  border-radius: 3px;
  cursor: pointer;
  transition: .2s;
  flex-shrink: 0;
}
.ctrl-btn:hover { background: rgba(0,201,167,.08); border-color: var(--teal); }
.ctrl-btn.playing { background: var(--red); border-color: var(--red); color: #fff; }
</style>
</head>

<script>

  [180, `${T(10,23,5)} <span class="muted">  lore_depth: 0.58 → <span class="ok">0.60</span>  aggression: 0.62 → <span style="color:var(--amber)">0.64</span></span>`, 3],

  [180, `${T(10,23,9)} <span class="info">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>`, 6],
  [500, `<div class="blank"></div>`, 6],
  [180, `<span class="muted">$</span> <span class="cursor"></span>`, 6],
]

const STEP_LABELS = ['BOOTING...','LOADING MEMORY...','FETCHING STATS...','DETECTING REGIME...','QUANTUM CIRCUIT FIRING...','CALLING CLAUDE...','TWEET GENERATED ✓']

let timeouts = []
let isPlaying = false

function setStep(idx) {
  document.querySelectorAll('.step-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx)
    el.classList.toggle('done', i < idx)
  })
}

function appendLine(html) {
  const c = document.getElementById('lines')
  const d = document.createElement('div')
  d.className = 'line'
  d.innerHTML = html
  c.appendChild(d)
  requestAnimationFrame(() => d.classList.add('show'))
  const tb = document.getElementById('term-body')
  tb.scrollTop = tb.scrollHeight
}

function startDemo() {
  if (isPlaying) return
  isPlaying = true
  const btn = document.getElementById('btn-play')
  btn.classList.add('playing')
  btn.textContent = '▶  PLAYING'

  const total = SCRIPT.length
  let acc = 0
  SCRIPT.forEach(([delay, html, step, cb], i) => {
    acc += delay
    const t = setTimeout(() => {
      appendLine(html)
      setStep(step)
      if (cb) cb()
      document.getElementById('prog').style.width = Math.round((i/total)*100) + '%'
      document.getElementById('prog-label').textContent = STEP_LABELS[step] || ''
      if (i === total - 1) {
        setTimeout(() => {
          isPlaying = false
          btn.classList.remove('playing')
          btn.textContent = '▶  PLAY'
          document.getElementById('prog').style.width = '100%'
          document.getElementById('prog-label').textContent = 'DEMO COMPLETE — PRESS RESET'
        }, 600)
      }
    }, acc)
    timeouts.push(t)
  })
}

function resetDemo() {
  timeouts.forEach(clearTimeout)
  timeouts = []
  isPlaying = false
  document.getElementById('lines').innerHTML = ''
  document.getElementById('prog').style.width = '0%'
  document.getElementById('prog-label').textContent = 'PRESS PLAY TO START'
  document.getElementById('btn-play').classList.remove('playing')
  document.getElementById('btn-play').textContent = '▶  PLAY'
  document.querySelectorAll('.step-item').forEach(s => s.classList.remove('active','done'))
  document.getElementById('sb-posts').textContent = '47'
