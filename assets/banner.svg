<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      .title { font-family: "Courier New", monospace; font-size: 72px; font-weight: 900; fill: #FF2222; letter-spacing: 8px; }
      .sub   { font-family: "Courier New", monospace; font-size: 14px; fill: #FF4444; letter-spacing: 5px; opacity: 0.9; }
      .tag   { font-family: "Courier New", monospace; font-size: 11px; fill: #666; letter-spacing: 3px; }
      .gl    { stroke: rgba(255,34,34,0.08); stroke-width: 0.5; }
    </style>
    <radialGradient id="bg" cx="25%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="40%" stop-color="#0f0505"/>
      <stop offset="100%" stop-color="#080202"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF2222" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF2222" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle-clip">
      <circle cx="150" cy="150" r="115"/>
    </clipPath>
    <filter id="ring-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="300" fill="url(#bg)" rx="16"/>
  <line class="gl" x1="0" y1="60" x2="900" y2="60"/>
  <line class="gl" x1="0" y1="120" x2="900" y2="120"/>
  <line class="gl" x1="0" y1="180" x2="900" y2="180"/>
  <line class="gl" x1="0" y1="240" x2="900" y2="240"/>
  <line class="gl" x1="150" y1="0" x2="150" y2="300"/>
  <line class="gl" x1="300" y1="0" x2="300" y2="300"/>
  <line class="gl" x1="450" y1="0" x2="450" y2="300"/>
  <line class="gl" x1="600" y1="0" x2="600" y2="300"/>
  <line class="gl" x1="750" y1="0" x2="750" y2="300"/>
  <circle cx="150" cy="150" r="140" fill="url(#glow)"/>
  <circle cx="150" cy="150" r="118" fill="none" stroke="#FF2222" stroke-width="2.5" opacity="0.6" filter="url(#ring-glow)"/>
  <circle cx="150" cy="150" r="122" fill="none" stroke="#FF2222" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 8"/>
  <image href="crab-mascot.png" x="35" y="35" width="230" height="230" clip-path="url(#circle-clip)" preserveAspectRatio="xMidYMid slice"/>
  <text class="title" x="320" y="145">$CRAB</text>
  <text class="sub" x="325" y="178">AI MEME AGENT · PUMP.FUN · SOLANA</text>
  <text class="tag" x="325" y="210">QUANTUM-POWERED · ADAPTIVE LEARNING · AUTONOMOUS</text>
  <text class="tag" x="325" y="240">github.com/buildOrDie/crab-agent</text>
  <rect x="14" y="14" width="28" height="3" fill="#FF2222" opacity="0.8" rx="1"/>
  <rect x="14" y="14" width="3" height="28" fill="#FF2222" opacity="0.8" rx="1"/>
  <rect x="858" y="14" width="28" height="3" fill="#FF2222" opacity="0.8" rx="1"/>
  <rect x="883" y="14" width="3" height="28" fill="#FF2222" opacity="0.8" rx="1"/>
  <rect x="14" y="283" width="28" height="3" fill="#FF2222" opacity="0.8" rx="1"/>
  <rect x="14" y="269" width="3" height="28" fill="#FF2222" opacity="0.8" rx="1"/>
  <rect x="858" y="283" width="28" height="3" fill="#FF2222" opacity="0.8" rx="1"/>
  <rect x="883" y="269" width="3" height="28" fill="#FF2222" opacity="0.8" rx="1"/>
  <circle cx="325" cy="260" r="3" fill="#FF2222" opacity="0.3"/>
  <circle cx="340" cy="260" r="3" fill="#FF2222" opacity="0.5"/>
  <circle cx="355" cy="260" r="3" fill="#FF4444" opacity="0.8"/>
  <circle cx="370" cy="260" r="3" fill="#FF2222" opacity="0.5"/>
  <circle cx="385" cy="260" r="3" fill="#FF2222" opacity="0.3"/>
</svg>
