<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#080202"/>
    </radialGradient>
    <radialGradient id="inner-glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#FF2222" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF2222" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="mascot-clip">
      <circle cx="200" cy="175" r="120"/>
    </clipPath>
    <filter id="glow-fx">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg-grad)" rx="80"/>
  <rect width="400" height="400" fill="none" stroke="#FF2222" stroke-width="2.5" rx="80" opacity="0.5"/>
  <circle cx="200" cy="175" r="135" fill="url(#inner-glow)"/>
  <circle cx="200" cy="175" r="125" fill="none" stroke="#FF2222" stroke-width="2" opacity="0.5" filter="url(#glow-fx)"/>
  <circle cx="200" cy="175" r="130" fill="none" stroke="#FF2222" stroke-width="0.5" opacity="0.25" stroke-dasharray="5 10"/>
  <image href="crab-mascot.png" x="80" y="55" width="240" height="240" clip-path="url(#mascot-clip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="30" y="30" width="24" height="3" fill="#FF2222" opacity="0.7"/>
  <rect x="30" y="30" width="3" height="24" fill="#FF2222" opacity="0.7"/>
  <rect x="346" y="30" width="24" height="3" fill="#FF2222" opacity="0.7"/>
  <rect x="367" y="30" width="3" height="24" fill="#FF2222" opacity="0.7"/>
  <rect x="30" y="367" width="24" height="3" fill="#FF2222" opacity="0.7"/>
  <rect x="30" y="346" width="3" height="24" fill="#FF2222" opacity="0.7"/>
  <rect x="346" y="367" width="24" height="3" fill="#FF2222" opacity="0.7"/>
  <rect x="367" y="346" width="3" height="24" fill="#FF2222" opacity="0.7"/>
  <text font-family="'Courier New', monospace" font-size="36" font-weight="900" fill="#FF2222" letter-spacing="6" x="200" y="340" text-anchor="middle">$CRAB</text>
  <circle cx="160" cy="370" r="3" fill="#FF2222" opacity="0.3"/>
  <circle cx="176" cy="370" r="3" fill="#FF2222" opacity="0.5"/>
  <circle cx="192" cy="370" r="3" fill="#FF4444" opacity="0.9"/>
  <circle cx="208" cy="370" r="3" fill="#FF4444" opacity="0.9"/>
  <circle cx="224" cy="370" r="3" fill="#FF2222" opacity="0.5"/>
  <circle cx="240" cy="370" r="3" fill="#FF2222" opacity="0.3"/>
</svg>
